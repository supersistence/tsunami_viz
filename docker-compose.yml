services:
  tsunami-viz:
    build: .
    container_name: tsunami-viz
    ports:
      - "127.0.0.1:8051:8050"
    environment:
      - PORT=8050
      - DEBUG=False
      - MAPTILER_API_KEY=${MAPTILER_API_KEY}
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8050', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3