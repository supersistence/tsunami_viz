name: Deploy to Linode

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/deploy_key

      - name: Copy files to server
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='.git' --exclude='venv' --exclude='__pycache__' \
            --exclude='*.pyc' --exclude='.pytest_cache' --exclude='.env' --exclude='.env.*' \
            ./ root@${{ secrets.SERVER_IP }}:/opt/tsunami-viz/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.SERVER_IP }} << 'EOF'
          set -e
          cd /opt/tsunami-viz

          echo "Stopping existing services..."
          docker compose down || true

          echo "Building and starting services..."
          docker compose up -d --build

          echo "Waiting for services to be ready..."
          sleep 15

          echo "Checking service health..."
          docker compose ps
          docker compose logs --tail=30 tsunami-viz

          echo "Testing application..."
          sleep 5

          if curl -f --max-time 10 http://127.0.0.1:8051 > /dev/null 2>&1; then
            echo "Application is responding"
          else
            echo "Health check warning, checking container status..."
            docker compose ps
            if docker compose ps | grep -q "healthy"; then
              echo "Container is healthy, deployment successful"
            else
              echo "Container is not healthy"
              docker compose logs --tail=50 tsunami-viz
              exit 1
            fi
          fi
          EOF

      - name: Deployment complete
        run: |
          echo "Deployment complete!"
          echo "https://tsunami.supersistence.org"
